name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM and build tools
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            clang llvm llvm-dev cmake build-essential

      - name: Verify tool versions
        run: |
          clang --version
          opt --version
          llvm-config --version
          cmake --version

      - name: Build pass plugin and runtime
        run: bash build.sh

      - name: Verify build artifacts exist
        run: |
          test -f build/FunctionProfiler.so || (echo "FunctionProfiler.so missing" && exit 1)
          test -f build/runtime.o            || (echo "runtime.o missing" && exit 1)
          echo "Build artifacts OK"

      - name: Run test1 (main only) — expect main count=1
        run: |
          bash run.sh tests/test1.c outputs/test1_profile.txt
          cat outputs/test1_profile.txt
          grep -q "main" outputs/test1_profile.txt

      - name: Run test2 (single call) — expect foo at rank 1
        run: |
          bash run.sh tests/test2.c outputs/test2_profile.txt
          cat outputs/test2_profile.txt
          awk '/^[[:space:]]*1[[:space:]]/ { if ($3 == "foo") exit 0; exit 1 }' outputs/test2_profile.txt

      - name: Run test3 (nested calls) — expect bar at rank 1
        run: |
          bash run.sh tests/test3.c outputs/test3_profile.txt
          cat outputs/test3_profile.txt
          awk '/^[[:space:]]*1[[:space:]]/ { if ($3 == "bar") exit 0; exit 1 }' outputs/test3_profile.txt

      - name: Run test4 (recursion) — expect recursive count=6
        run: |
          bash run.sh tests/test4.c outputs/test4_profile.txt
          cat outputs/test4_profile.txt
          awk '/recursive/ { if ($2 == 6) exit 0; exit 1 }' outputs/test4_profile.txt

      - name: Run test5 (loops) — expect loop_func count=60
        run: |
          bash run.sh tests/test5.c outputs/test5_profile.txt
          cat outputs/test5_profile.txt
          awk '/loop_func/ { if ($2 == 60) exit 0; exit 1 }' outputs/test5_profile.txt

      - name: Run test6 (unused function) — unused must not appear in profile
        run: |
          bash run.sh tests/test6.c outputs/test6_profile.txt
          cat outputs/test6_profile.txt
          if grep -q "unused" outputs/test6_profile.txt; then
            echo "FAIL: unused function appeared in profile"
            exit 1
          fi
          echo "OK: unused function correctly absent"

      - name: Upload test profile outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-profiles
          path: outputs/
